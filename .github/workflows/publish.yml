name: Publish to RubyGems

on:
  release:
    types: [published]

jobs:
  publish:
    name: Build & Push Gem
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"

      - name: Publish via trusted publishing
        uses: rubygems/release-gem@v1
